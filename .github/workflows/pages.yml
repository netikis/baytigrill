name: Publicar site (GitHub Pages)



on:

  push:

    branches: [main, master]

  workflow_dispatch:



permissions:

  contents: read

  pages: write

  id-token: write



concurrency:

  group: pages

  cancel-in-progress: true



jobs:

  deploy:

    runs-on: ubuntu-latest

    environment:

      name: github-pages

      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - uses: actions/checkout@v4



      - name: Gerar ícones PWA e manifest (URLs absolutas)
        env:
          PWA_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq imagemagick gettext-base
          chmod +x scripts/gerar-icones.sh
          ./scripts/gerar-icones.sh
          export PWA_BASE_URL
          envsubst < manifest.template.webmanifest > manifest.webmanifest
          echo "Manifest icons:"
          grep -o '"src": "[^"]*"' manifest.webmanifest



      - name: Gerar firebase-env.js (secrets — não ficam no repositório)

        env:

          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}

          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}

          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}

          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

        run: |

          if [ -z "$FIREBASE_API_KEY" ]; then

            echo "ERRO: Configure os secrets FIREBASE_* no GitHub (Settings → Secrets → Actions)"

            exit 1

          fi

          envsubst < firebase-env.template.js > firebase-env.js



      - uses: actions/upload-pages-artifact@v3

        with:

          path: .



      - id: deployment

        uses: actions/deploy-pages@v4

